<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Efty — RSS Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Efty</h1>
      <button id="subscribe-btn">+ Subscribe</button>
    </header>
    <main>
      <aside id="feeds-pane">
        <h2>Feeds</h2>
        <ul id="feeds-list"></ul>
      </aside>
      <section id="posts-pane">
        <div id="posts-toolbar">
          <h2 id="posts-title">Posts</h2>
          <select id="posts-filter">
            <option value="all">All</option>
            <option value="unread">Unread</option>
            <option value="read">Read</option>
          </select>
        </div>
        <ul id="posts-list"></ul>
      </section>
      <section id="detail-pane">
        <div id="detail-empty">Select a post to read</div>
        <article id="detail-content" hidden>
          <div id="detail-header">
            <h2 id="detail-title"></h2>
            <button id="detail-toggle-read"></button>
          </div>
          <p id="detail-meta"></p>
          <div id="detail-body"></div>
          <a id="detail-link" target="_blank" rel="noopener noreferrer">Open original →</a>
        </article>
      </section>
    </main>
  </div>

  <div id="modal-overlay" hidden>
    <div id="modal">
      <div id="modal-header">
        <h2>Subscribe to Feed</h2>
        <button type="button" id="modal-close">&times;</button>
      </div>
      <form id="subscribe-form">
        <input type="url" id="feed-url-input" placeholder="https://example.com/feed.xml" required>
        <div id="modal-error" hidden></div>
        <div id="modal-actions">
          <button type="button" id="modal-cancel">Cancel</button>
          <button type="submit" id="modal-submit">Subscribe</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Efty — Sign in</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login">
  <section id="login-card">
    <h1>Efty 🦎</h1>
    <nav id="auth-tabs">
      <button class="tab selected" data-tab="login">Sign in</button>
      <button class="tab" data-tab="register">Register</button>
    </nav>

    <form id="login-form">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" name="username"
             required autocomplete="username">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" name="password"
             required autocomplete="current-password">
      <p id="login-error" hidden></p>
      <button type="submit">Sign in</button>
    </form>

    <form id="register-form" hidden>
      <label for="reg-username">Username</label>
      <input type="text" id="reg-username" name="username"
             required autocomplete="username">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" name="password"
             required autocomplete="new-password" minlength="8">
      <p id="register-error" hidden></p>
      <button type="submit">Create account</button>
    </form>
  </section>

  <script type="module" src="/static/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Efty — RSS Reader</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Efty 🦎</h1>
      <nav id="header-actions">
        <button id="subscribe-btn">+ Subscribe</button>
        <button id="logout-btn">Sign out</button>
      </nav>
    </header>
    <main>
      <aside id="feeds-pane">
        <h2>Feeds</h2>
        <ul id="feeds-list"></ul>
      </aside>
      <section id="posts-pane">
        <header id="posts-toolbar">
          <h2 id="posts-title">Posts</h2>
          <select id="posts-filter">
            <option value="all">All</option>
            <option value="unread">Unread</option>
            <option value="read">Read</option>
          </select>
        </header>
        <ul id="posts-list"></ul>
      </section>
      <section id="detail-pane">
        <p id="detail-empty">Select a post to read</p>
        <article id="detail-content" hidden>
          <header id="detail-header">
            <h2 id="detail-title"></h2>
            <button id="detail-toggle-read"></button>
          </header>
          <p id="detail-meta"></p>
          <div id="detail-body"></div>
          <a id="detail-link" target="_blank" rel="noopener noreferrer">Open original →</a>
        </article>
      </section>
    </main>
  </div>

  <dialog id="modal">
    <header id="modal-header">
      <h2>Subscribe to Feed</h2>
      <button type="button" id="modal-close">&times;</button>
    </header>
    <form id="subscribe-form">
      <input type="url" id="feed-url-input" placeholder="https://example.com/feed.xml" required>
      <p id="modal-error" hidden></p>
      <footer id="modal-actions">
        <button type="button" id="modal-cancel">Cancel</button>
        <button type="submit" id="modal-submit">Subscribe</button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
